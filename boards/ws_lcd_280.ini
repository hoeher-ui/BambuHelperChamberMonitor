; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-2.8 (2.8" ST7789 240x320 + CST328 touch)
;  https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-2.8
;  Community / untested - I do not own this board. Pin map from Waveshare wiki.
; =============================================================================
[env:ws_lcd_280]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"ws_lcd_280\"
    -D BOARD_IS_WS280=1
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=5
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; --- Layout profile (same 240x320 as ws_lcd_200) ---
    -D DISPLAY_240x320=1
    ; --- Touch (CST328 on its own I2C bus, not shared with main I2C) ---
    -D USE_CST328=1
    -D CST328_SDA=1
    -D CST328_SCL=3
    -D CST328_RST=2
    -D CST328_IRQ=4
