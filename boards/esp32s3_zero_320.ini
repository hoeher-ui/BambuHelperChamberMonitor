; =============================================================================
;  Waveshare ESP32-S3-Zero + external ST7789 240x320 (e.g. GMT020-02-8P)
;  Same pinout as [env:esp32s3_zero]; only the panel module is larger.
;  Drives the existing layout_240x320 (CYD/WS200-style) UI.
;  Community / experimental - not part of the official release set.
; =============================================================================
[env:esp32s3_zero_320]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_4mb.csv
board_build.arduino.memory_type = qio_qspi
lib_deps = ${common.lib_deps}
build_flags =
    -D BOARD_VARIANT=\"esp32s3_zero_320\"
    -D BOARD_IS_S3=1
    -D BOARD_IS_S3_ZERO=1
    -D BOARD_PANEL_320=1
    -D DISPLAY_240x320=1
    -D BOARD_HAS_PSRAM
    -D ENABLE_OTA_AUTO=1
    -D BACKLIGHT_PIN=13
    ; --- USB Serial (S3 native USB CDC) ---
    -D ARDUINO_USB_CDC_ON_BOOT=1
